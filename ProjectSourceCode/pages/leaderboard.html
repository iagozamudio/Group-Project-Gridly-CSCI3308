<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridly Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <img src="../Leaderboard/resources/logo.png" alt="Gridly Logo" class="logo mb-3">
            <p class="text-muted">Leaderboard</p>
        </div>
        <div class="card shadow mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h2 class="text-center mb-4">Top 5 Players</h2>
                <div class="list-group">
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <span><strong>#1</strong> User One</span>
                        <span class="badge bg-warning text-dark rounded-pill">1500 pts</span>
                    </div>
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <span><strong>#2</strong> User Two</span>
                        <span class="badge bg-secondary rounded-pill">1400 pts</span>
                    </div>
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <span><strong>#3</strong> User Three</span>
                        <span class="badge bg-danger rounded-pill">1300 pts</span>
                    </div>
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <span><strong>#4</strong> User Four</span>
                        <span class="badge bg-primary rounded-pill">1200 pts</span>
                    </div>
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <span><strong>#5</strong> User Five</span>
                        <span class="badge bg-success rounded-pill">1100 pts</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
