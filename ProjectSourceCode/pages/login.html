<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/loginRegistration.css">
</head>
<body>
 
    <div class="d-flex flex-column align-items-center py-4">
        <!-- Logo -->
        <img src="../img/logo.png" alt="Logo" class="img-fluid mb-4" style="max-width: 400px;">
 
        <!-- Card -->
        <div class="card shadow" style="width: 400px;">
            <div class="card-body">
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <input type="text" id="username" name="username" class="form-control" placeholder="Username or email" required>
                        <label for="username" class="form-label mt-1">Username or email</label>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                        <div class="d-flex justify-content-between mt-1">
                            <label for="password" class="form-label">Password</label>
                            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                        </div>
                    </div>
                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-success">Log In</button>
                    </div>
                </form>
 
                <div class="divider-waves">
                    <div class="wave-line"></div>
                    <span class="px-2">or</span>
                    <div class="wave-line"></div>
                </div>
 
                <div class="d-grid mt-2">
                    <a href="register.html" class="btn btn-primary">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
 
    <!-- Mission statement -->
    <footer class="text-center py-3">
        <p class="mb-0">An engaging experience for crossword enthusiasts who want to test themselves and compete against others.</p>
    </footer>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
