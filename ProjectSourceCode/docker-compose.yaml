services:
  db:
    image: postgres
    env_file: .env
    expose:
      - '5432'
    volumes:
      - gridly-db:/var/lib/postgresql
      - ./init_data:/docker-entrypoint-initdb.d

  web:
    image: node:lts
    user: 'node'
    working_dir: /home/node/app
    env_file: .env
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/home/node/app
    command: 'npm run testandrun'

volumes:
  gridly-db: